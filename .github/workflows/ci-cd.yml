name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Run Terraform apply"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r app/producer_helpers/requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile \
            app/producer_helpers/gbfs_to_minio_kafka.py \
            app/consumers/minio_to_postgres.py \
            dashboard/app.py

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform fmt -check -recursive infra/terraform/*.tf

      - name: Terraform validate
        working-directory: infra/terraform
        run: |
          terraform init -backend=false
          terraform validate

  cd:
    name: Manual Deploy (Terraform)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Generate terraform.tfvars
        working-directory: infra/terraform
        run: |
          cat > terraform.tfvars <<EOF
          aws_region = "${{ secrets.AWS_REGION }}"
          key_name = "${{ secrets.EC2_KEY_NAME }}"
          repo_url = "https://github.com/${{ github.repository }}.git"
          instance_type = "t3.medium"
          EOF

      - name: Terraform plan
        working-directory: infra/terraform
        run: |
          terraform init
          terraform plan

      - name: Terraform apply
        if: github.event.inputs.deploy == 'true'
        working-directory: infra/terraform
        run: terraform apply -auto-approve